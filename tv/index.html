<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINGOLÃO - TV</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <link rel="stylesheet" href="../shared/css/style.css">
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        .tv-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .main-display {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 2px solid var(--border-color);
            position: relative;
        }

        .round-title {
            position: absolute;
            top: 2rem;
            font-size: 3rem;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .current-number {
            font-size: 25rem;
            font-weight: 900;
            color: var(--primary-color);
            line-height: 1;
            text-shadow: 0 0 40px rgba(16, 185, 129, 0.2);
        }

        .current-number.empty {
            font-size: 8rem;
            color: var(--muted-color);
            text-shadow: none;
        }

        .side-panel {
            flex: 1;
            background-color: var(--panel-bg);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            overflow-y: auto;
        }

        .panel-section-title {
            font-size: 1.5rem;
            color: #ffffff;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }

        .current-numbers-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .small-number {
            background-color: var(--bg-color);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        .small-number.highlight {
            background-color: var(--primary-dark);
            color: white;
            border-color: var(--primary-color);
        }

        .closed-round {
            background-color: var(--bg-color);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border: 1px solid var(--border-color);
        }

        .closed-round-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .closed-round-title {
            font-weight: 800;
            color: var(--secondary-color);
        }

        .closed-round-count {
            color: var(--muted-color);
            font-size: 0.9rem;
        }

        .closed-round-numbers {
            color: var(--text-color);
            font-family: monospace;
            font-size: 1.1rem;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div class="tv-layout">
        <div class="main-display">
            <div class="round-title" id="tv-round-title">AGUARDANDO...</div>

            <div class="current-number empty" id="tv-current-number">--</div>

            <div id="tv-cartela-container">
                <h3
                    style="text-align: center; color: var(--primary-color); margin-bottom: 1rem; font-size: 1.5rem; font-weight: 800;">
                    🔍 SUSPENSE... CONFERINDO CARTELA
                </h3>
                <div id="tv-cartela-grid" style="transform: scale(1.15);"></div>
            </div>
        </div>

        <div class="side-panel">
            <div>
                <h3 class="panel-section-title">NÚMEROS SORTEADOS</h3>
                <div class="current-numbers-grid" id="tv-current-numbers-grid"></div>
            </div>

            <div style="flex: 1;">
                <h3 class="panel-section-title">RODADAS ANTERIORES</h3>
                <div id="tv-closed-rounds"></div>
            </div>
        </div>
    </div>

    <div id="tv-overlay" class="tv-overlay">
        <h1>🏆 RODADA ENCERRADA</h1>
        <h2 id="overlay-title">--</h2>
        <p id="overlay-count">-- números sorteados</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="../shared/js/state.js"></script>
    <script src="js/tv.js"></script>
</body>

</html>
