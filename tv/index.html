<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV - BINGOLÃO</title>
    <link rel="stylesheet" href="../shared/css/style.css">
    <style>
        body {
            background-color: #0d1321;
            /* Azul escuro do fundo */
            overflow: hidden;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
        }

        .tv-layout {
            display: flex;
            height: 100vh;
            padding: 2.5rem;
            gap: 4rem;
            box-sizing: border-box;
        }

        /* =========================================
           LADO ESQUERDO (Imune ao Zoom)
           ========================================= */
        .tv-left {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* O título tem sua caixinha reservada, não flutua mais */
        .tv-title-wrapper {
            height: 15vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tv-title {
            font-size: 3.5rem;
            /* Isso sofre zoom normalmente */
            font-weight: 900;
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            text-align: center;
        }

        /* O contêiner do centro protege os itens */
        .tv-center-wrapper {
            height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        /* Usando 'vh' o número fica cravado na altura da tela, ignorando o zoom */
        .tv-big-number {
            font-size: 55vh;
            font-weight: 900;
            line-height: 1;
            color: white;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* Cartela blindada em 'vh' */
        .tv-card-container {
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5vh;
            background-color: #172136;
            padding: 2.5vh;
            border-radius: 1.5vh;
            border: 0.4vh solid #25334d;
            width: 75vh;
            /* Força ser quadrada com base na altura da TV */
            max-width: 100%;
        }

        .tv-card-container.visible {
            display: grid;
        }

        .tv-card-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5vh;
            font-weight: 900;
            background-color: #0d1321;
            border: 0.2vh solid #334155;
            border-radius: 1vh;
            color: white;
            transition: background-color 0.3s;
        }

        .tv-card-cell.matched {
            background-color: #20c978;
            border-color: #1aa361;
            color: white;
        }

        /* =========================================
           LADO DIREITO (Reativo ao Zoom)
           ========================================= */
        .tv-right {
            width: 500px;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            max-width: 40vw;
            /* Garante que a lista não amasse a esquerda no super-zoom */
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 900;
            color: white;
            margin-top: 0;
            margin-bottom: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .drawn-chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .drawn-chip {
            background-color: #172136;
            border: 1px solid #25334d;
            color: white;
            font-size: 1.25rem;
            font-weight: 800;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .drawn-chip.highlight {
            background-color: #20c978;
            border-color: #1aa361;
        }

        .previous-rounds-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
            flex: 1;
        }

        .round-card {
            background-color: #172136;
            border: 1px solid #25334d;
            border-radius: 8px;
            padding: 1.2rem;
        }

        .round-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .round-card-title {
            color: #60a5fa;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .round-card-count {
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .round-card-numbers {
            color: white;
            font-size: 0.95rem;
            word-spacing: 8px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="tv-layout">
        <div class="tv-left">
            <div class="tv-title-wrapper">
                <h1 class="tv-title" id="tv-round-name">BINGO</h1>
            </div>

            <div class="tv-center-wrapper">
                <div class="tv-big-number" id="tv-last-number">--</div>

                <div id="tv-review-card" class="tv-card-container"></div>
            </div>
        </div>

        <div class="tv-right">
            <div>
                <h2 class="section-title">NÚMEROS SORTEADOS</h2>
                <div class="drawn-chips-container" id="tv-drawn-numbers">
                </div>
            </div>

            <div style="display: flex; flex-direction: column; flex: 1; min-height: 0;">
                <h2 class="section-title">RODADAS ANTERIORES</h2>
                <div class="previous-rounds-container" id="tv-previous-rounds">
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="../shared/js/state.js"></script>
    <script src="js/tv.js"></script>
</body>

</html>
