<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - BINGOLÃO</title>
    <link rel="stylesheet" href="../shared/css/style.css">
    <style>
        body {
            background-color: var(--bg-color);
        }

        .admin-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            min-height: 100vh;
        }

        .header {
            text-align: center;
        }

        .round-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--panel-bg);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .round-info input {
            background: transparent;
            border: none;
            color: var(--secondary-color);
            font-size: 1.25rem;
            font-weight: 800;
            width: 100%;
            outline: none;
        }

        .main-display {
            text-align: center;
            background-color: var(--panel-bg);
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .last-number {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1;
            margin: 0.5rem 0;
            color: var(--text-color);
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn-draw {
            font-size: 1.5rem;
            padding: 1.5rem;
            font-weight: 900;
        }

        .secondary-actions {
            display: flex;
            gap: 1rem;
        }

        .secondary-actions button {
            flex: 1;
        }

        .history-panel {
            background-color: var(--panel-bg);
            padding: 0.5rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 0.25rem;
            margin-top: 0.5rem;
        }

        .history-chip {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 40px;
            padding: 0;
        }

        .history-chip:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .closed-rounds-panel {
            background-color: var(--panel-bg);
            padding: 0.5rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .closed-round-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .closed-round-item:last-child {
            border-bottom: none;
        }

        .danger-zone {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--danger-color);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <div class="header">
            <h2>📱 Controle do Bingo</h2>
        </div>

        <div class="round-info">
            <input type="text" id="admin-round-name" value="QUINA" placeholder="Nome da Rodada (ex: QUINA)">
        </div>

        <div class="main-display">
            <div style="color: var(--muted-color); font-weight: 600;">ÚLTIMO NÚMERO</div>
            <div class="last-number" id="admin-last-number">--</div>
            <div style="color: var(--muted-color); margin-top: 1rem;" id="admin-count">0 sorteados</div>
        </div>

        <div class="action-buttons">
            <div style="display: flex; gap: 0.25rem; margin-bottom: 0.25rem; width: 100%;">
                <button class="btn btn-primary btn-draw" id="btn-draw" style="flex: 1;">SORTEAR AUTOMÁTICO</button>
            </div>
            <div style="display: flex; gap: 0.25rem; margin-bottom: 0.5rem; width: 100%;">
                <input type="number" id="input-manual" class="form-control" placeholder="Nº Ex: 7"
                    style="flex: 1; max-width: 100px;" autocomplete="off">
                <button class="btn btn-primary" id="btn-draw-manual" style="flex: 2;">+ Inserir Manual</button>
            </div>
            <div class="secondary-actions">
                <button class="btn" id="btn-undo" title="Desfaz a última ação realizada">↩ Desfazer Última Ação</button>
                <button class="btn" id="btn-close-round">Fechar Rodada</button>
            </div>
        </div>

        <div class="history-panel">
            <h3 style="color: var(--muted-color); font-size: 1rem;">Números Sorteados</h3>
            <div class="history-grid" id="admin-history">
            </div>
        </div>

        <div class="closed-rounds-panel">
            <h3 style="color: var(--muted-color); font-size: 1rem; margin-bottom: 1rem;">Rodadas Anteriores</h3>
            <div id="admin-closed-rounds">
                <div style="color: var(--muted-color); font-size: 0.9rem;">Nenhuma rodada fechada</div>
            </div>
        </div>

        <div>
            <button class="btn btn-warning" id="btn-new-series" style="width: 100%;">Iniciar nova Série</button>
        </div>

        <div class="settings-zone"
            style="background-color: var(--panel-bg); padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--border-color);">
            <h3 style="color: var(--text-color); font-size: 0.9rem; margin-bottom: 0.5rem;">⚙️ Configurações do Jogo
            </h3>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
                <label style="font-size: 0.85rem; color: var(--muted-color);">Mínimo:</label>
                <input type="number" id="input-range-min" class="form-control" style="width: 70px;">
                <label style="font-size: 0.85rem; color: var(--muted-color); margin-left: 0.5rem;">Máximo:</label>
                <input type="number" id="input-range-max" class="form-control" style="width: 70px;">
                <button class="btn btn-primary" id="btn-save-range"
                    style="font-size: 0.85rem; padding: 0.4rem 0.8rem; margin-left: auto;">Salvar</button>
            </div>
        </div>

        <div
            style="display:flex; justify-content:space-between; padding-top:0.5rem; border-top:1px solid var(--border-color);">
            <button class="btn" id="btn-export" style="font-size:0.85rem;">Exportar Backup</button>
            <label class="btn" style="cursor:pointer; font-size:0.85rem;">
                Importar Backup
                <input type="file" id="input-import" style="display:none;" accept=".json">
            </label>
        </div>
    </div>

    <div id="custom-modal-overlay" class="modal-overlay">
        <div class="modal-content" id="modal-content-container">
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script src="../shared/js/state.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
