<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINGOLÃO</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <link rel="stylesheet" href="shared/css/style.css">
    <link rel="manifest" href="manifest.json">
    <style>
        .portal-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .portal-title {
            font-size: 3rem;
            margin-bottom: 2rem;
            color: var(--primary-color);
        }

        .portal-links {
            display: flex;
            gap: 2rem;
        }

        .portal-card {
            background-color: var(--panel-bg);
            padding: 3rem;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-color);
            border: 2px solid var(--border-color);
            transition: border-color 0.2s, transform 0.2s;
            width: 250px;
        }

        .portal-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-5px);
        }

        .portal-card h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .portal-card p {
            color: var(--muted-color);
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="portal-container">
        <h1 class="portal-title">🎲 BINGOLÃO</h1>
        <div class="portal-links">
            <a href="admin/index.html" class="portal-card" target="_blank">
                <h2>📱 Painel Admin</h2>
                <p>Controle o sorteio e gerencie as rodadas.</p>
            </a>
            <a href="tv/index.html" class="portal-card" target="_blank">
                <h2>📺 Tela da TV</h2>
                <p>Abra na TV para exibição ao público.</p>
            </a>
        </div>
    </div>
</body>

</html>
